<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点赞排行榜</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #e8e5df; padding: 20px;
    font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
  }

  .card {
    width: 1080px; height: 1440px; background: #FFFFFF;
    border-radius: 4px; display: flex; flex-direction: column;
    position: relative; overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.06);
  }

  .card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(53, 193, 190, 0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .card::after {
    content: ''; position: absolute;
    top: 40px; left: 40px; right: 40px; height: 1px;
    background: rgba(53, 193, 190, 0.18); z-index: 2; pointer-events: none;
  }

  .dot {
    position: absolute; width: 8px; height: 8px;
    background: #35c1be; border-radius: 50%; opacity: 0.5; z-index: 2;
  }
  .dot-1 { top: 34px; left: 34px; }
  .dot-2 { top: 34px; right: 34px; }
  .dot-3 { bottom: 62px; left: 34px; }
  .dot-4 { bottom: 62px; right: 34px; }

  .content-area {
    flex: 1; padding: 60px 80px 30px;
    display: flex; flex-direction: column;
    position: relative; z-index: 1;
  }

  /* 品牌栏 */
  .brand-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
  .brand-left { display: flex; align-items: center; gap: 14px; }
  .logo-img { height: 48px; width: auto; }
  .brand-name { font-size: 32px; font-weight: 700; color: #35c1be; letter-spacing: 2px; }
  .header-badge {
    background: rgba(53, 193, 190, 0.12); border: 1px solid rgba(53, 193, 190, 0.40);
    padding: 8px 20px; border-radius: 20px; font-size: 22px;
    color: #35c1be; letter-spacing: 2px; font-weight: 600;
  }

  /* 标题 */
  .header { text-align: center; margin-bottom: 30px; }
  .header h1 { font-size: 44px; font-weight: 700; color: #1a1a1a; letter-spacing: 1px; margin-bottom: 8px; }
  .header .date { font-size: 24px; color: #888; }
  .title-underline {
    width: 100%; height: 2px;
    background: linear-gradient(to right, transparent, #35c1be, transparent);
    margin: 20px 0 30px;
  }

  /* 表头 */
  .rank-header {
    display: flex; align-items: center;
    padding: 16px 24px; margin-bottom: 10px;
    background: rgba(53, 193, 190, 0.08);
    border-radius: 12px;
    border: 1.5px solid rgba(53, 193, 190, 0.4);
  }
  .rank-header span {
    color: #35c1be; font-size: 20px; font-weight: 700;
  }

  /* 排名行 */
  .rank-row {
    display: flex; align-items: center;
    padding: 16px 24px; margin-bottom: 8px;
    background: #fff; border-radius: 12px;
    border: 1.5px solid rgba(53, 193, 190, 0.20);
    box-shadow: 0 2px 8px rgba(0,0,0,0.02);
  }
  .rank-num { width: 50px; text-align: center; font-size: 26px; font-weight: 700; color: #35c1be; }
  .rank-source { width: 80px; text-align: center; font-size: 18px; color: #888; }
  .rank-builder { width: 160px; font-size: 22px; font-weight: 600; color: #2a2a2a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rank-title { flex: 1; font-size: 20px; color: #555; padding: 0 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; }
  .rank-likes { width: 90px; text-align: center; font-size: 20px; color: #888; }
  .rank-retweets { width: 90px; text-align: center; font-size: 20px; color: #888; }

  /* 底部水印 */
  .footer { text-align: center; margin-top: auto; padding-top: 20px; }
  .watermark { font-size: 20px; color: #35c1be; letter-spacing: 2px; opacity: 0.8; font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div class="dot dot-1"></div><div class="dot dot-2"></div><div class="dot dot-3"></div><div class="dot dot-4"></div>
  <div class="content-area">
    <div class="brand-bar">
      <div class="brand-left">
        <img class="logo-img" src="{{LOGO_BASE64}}" alt="牛雪梨AI">
        <span class="brand-name">牛雪梨AI</span>
      </div>
      <span class="header-badge">Builder Digest</span>
    </div>
    <div class="header">
      <h1>🔥 {{DATE_CN}} · 点赞排行榜</h1>
      <div class="date">TOP 10</div>
    </div>
    <div class="title-underline"></div>
    <div class="rank-header">
      <span class="rank-num">序号</span>
      <span class="rank-source">来源</span>
      <span class="rank-builder">Builder</span>
      <span class="rank-title">中文摘要</span>
      <span class="rank-likes">点赞</span>
      <span class="rank-retweets">转发</span>
    </div>
    {{ROWS}}
  </div>
  <div class="footer">
    <div class="watermark">Builder Digest · 来自牛雪梨AI</div>
  </div>
</div>
</body>
</html>
